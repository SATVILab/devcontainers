name: 'Pre-build Dev Container'

on:
  push:
    tags:
      - 'v*'
      - '*-v*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version component to bump (major, minor, patch)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      version:
        description: 'Exact version to build (e.g. v1.2.3). Leave blank if using bump_type.'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags for version bumping

      - name: Run Dev Container Prebuild
        uses: MiguelRodo/actions/prebuild-devcontainer@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          bump_type: ${{ github.event.inputs.bump_type }}
          version: ${{ github.event.inputs.version }}
